<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram Kaithwas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== VARIABLES ===== */
:root{
    --bg1:#141e30;
    --bg2:#243b55;
    --text:#ffffff;
    --card:rgba(255,255,255,0.08);
    --accent:#00f7ff;
}

body.light{
    --bg1:#f4f4f4;
    --bg2:#ffffff;
    --text:#111;
    --card:#ffffff;
}

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.4s ease;
}

img{
    max-width:100%;
}

/* ===== NAV ===== */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
}

.theme-toggle{
    width:60px;
    height:30px;
    background:#222;
    border-radius:50px;
    display:flex;
    align-items:center;
    padding:5px;
    cursor:pointer;
}

.toggle-circle{
    width:22px;
    height:22px;
    background:#00f7ff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.4s;
}

body.light .toggle-circle{
    transform:translateX(30px);
}

/* ===== HERO ===== */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px 10%;
    min-height:80vh;
}

.hero-text h1{
    font-size:48px;
}

.hero-text span{
    color:var(--accent);
}

.hero-text p{
    font-size:20px;
    margin:10px 0 30px;
}

.hero-buttons{
    display:flex;
    gap:20px;
}

.btn{
    padding:12px 25px;
    border-radius:30px;
    border:2px solid var(--accent);
    color:var(--accent);
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:var(--accent);
    color:#000;
}

/* ===== PROJECTS ===== */
.projects{
    padding:80px 10%;
    text-align:center;
}

.project-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.project-card{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.project-card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 15px var(--accent);
}

/* ===== SKILLS ===== */
.skills{
    padding:80px 10%;
    text-align:center;
}

.skill-track{
    display:flex;
    overflow:auto;
    gap:20px;
    padding:10px;
}

.skill-box{
    min-width:120px;
    background:var(--card);
    padding:20px;
    border-radius:10px;
}

/* ===== SOCIAL ===== */
.social{
    text-align:center;
    margin:40px 0;
}

.social a{
    margin:0 15px;
    font-size:24px;
    color:var(--accent);
}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:768px){

    nav{
        padding:15px 20px;
    }

    .hero{
        flex-direction:column;
        text-align:center;
        padding:40px 20px;
    }

    .hero-text h1{
        font-size:30px;
    }

    .hero-text p{
        font-size:16px;
    }

    .hero-buttons{
        flex-direction:column;
    }

    .hero img{
        width:220px;
        margin-top:20px;
    }

    section{
        padding:40px 20px !important;
    }

}

</style>
</head>

<body>

<nav>
    <h2>~ My_Portfolio :</h2>
    <div class="theme-toggle" onclick="toggleMode()">
        <div class="toggle-circle">
            <i class="fa-solid fa-moon"></i>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Hi, I'm <span>Ram Kaithwas</span></h1>
        <p>MERN Stack Developer | Cloud Engineer</p>

        <div class="hero-buttons">
            <a href="#" class="btn">Resume</a>
            <a href="#projects" class="btn">Projects</a>
            <a href="#socials" class="btn">Socials</a>
        </div>
    </div>

    <img src="https://via.placeholder.com/300" alt="profile">
</section>

<section class="projects" id="projects">
    <h2>Projects</h2>

    <div class="project-container">
        <div class="project-card">MERN Auth System</div>
        <div class="project-card">AI Robot</div>
        <div class="project-card">Task Manager</div>
    </div>
</section>

<section class="skills">
    <h2>Skills</h2>

    <div class="skill-track">
        <div class="skill-box">React</div>
        <div class="skill-box">Node</div>
        <div class="skill-box">MongoDB</div>
        <div class="skill-box">Docker</div>
    </div>
</section>

<section class="social" id="socials">
    <h2>Socials</h2>
    <a href="#"><i class="fa-brands fa-github"></i></a>
    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
    <a href="#"><i class="fa-solid fa-envelope"></i></a>
</section>

<footer style="text-align:center;padding:20px;">
    © Ram Kaithwas
</footer>

<script>
function toggleMode(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
